<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Testing in Progress...</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .loading-box {
            text-align: center;
            padding: 48px;
        }

        .spinner {
            width: 64px;
            height: 64px;
            border: 4px solid #222;
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 32px auto;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-message {
            font-size: 16px;
            color: #00ff88;
            margin-bottom: 12px;
            min-height: 24px;
        }

        .status-sub {
            font-size: 12px;
            color: #555;
            margin-bottom: 32px;
        }

        .progress-steps {
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
            margin-top: 24px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: #444;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #222;
        }

        .step.active {
            color: #00ff88;
            border-color: #00ff88;
            background: #0a1f14;
        }

        .step.done {
            color: #555;
            border-color: #333;
        }

        .step-icon {
            font-size: 16px;
            width: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loading-box">
            <div class="spinner"></div>
            <h1 style="color: #00ff88; margin-bottom: 8px;">Testing in Progress</h1>
            <p class="subtitle">Image: <strong>{{ docker_image }}</strong></p>

            <div class="status-message" id="status-msg">Starting test...</div>
            <div class="status-sub">Do not close or refresh this page</div>

            <div class="progress-steps">
                <div class="step" id="step-deploy">
                    <span class="step-icon">🚀</span> Deploying image to Kubernetes
                </div>
                <div class="step" id="step-pods">
                    <span class="step-icon">⏳</span> Waiting for pods to be ready
                </div>
                <div class="step" id="step-pod-chaos">
                    <span class="step-icon">💥</span> Pod Chaos Test
                </div>
                <div class="step" id="step-cpu">
                    <span class="step-icon">🔥</span> CPU Stress Test
                </div>
                <div class="step" id="step-memory">
                    <span class="step-icon">🧠</span> Memory Stress Test
                </div>
                <div class="step" id="step-network">
                    <span class="step-icon">🌐</span> Network Delay Test
                </div>
                <div class="step" id="step-packet">
                    <span class="step-icon">📡</span> Packet Loss Test
                </div>
                <div class="step" id="step-recovery">
                    <span class="step-icon">✅</span> Recovery Validation
                </div>
            </div>
        </div>
    </div>

    <script>
        const jobId = "{{ job_id }}";
        const steps = {
            'deploying': ['step-deploy'],
            'waiting':   ['step-deploy', 'step-pods'],
            'testing':   ['step-deploy', 'step-pods', 'step-pod-chaos',
                          'step-cpu', 'step-memory', 'step-network',
                          'step-packet', 'step-recovery'],
        };

        function updateSteps(status) {
            const allSteps = [
                'step-deploy', 'step-pods', 'step-pod-chaos',
                'step-cpu', 'step-memory', 'step-network',
                'step-packet', 'step-recovery'
            ];
            const activeList = steps[status] || [];
            allSteps.forEach((id, index) => {
                const el = document.getElementById(id);
                if (!el) return;
                el.classList.remove('active', 'done');
                if (activeList.includes(id)) {
                    el.classList.add('active');
                }
            });
        }

        function poll() {
            fetch(`/status/{{ job_id }}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('status-msg').textContent = data.message;
                    updateSteps(data.status);

                    if (data.status === 'done') {
                        window.location.href = `/result/{{ job_id }}`;
                    } else if (data.status === 'error') {
                        document.getElementById('status-msg').style.color = '#ff4444';
                        document.getElementById('status-msg').textContent =
                            'Error: ' + data.message;
                    } else {
                        setTimeout(poll, 2000);
                    }
                })
                .catch(() => setTimeout(poll, 3000));
        }

        poll();
    </script>
</body>
</html>
